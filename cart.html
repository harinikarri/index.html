<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

/* TITLE */
h2{
    text-align:center;
    padding:20px;
}

/* CART CONTAINER */
#cart-items{
    max-width:700px;
    margin:auto;
    padding:0;
}

/* CART ITEM BOX */
.item{
    background:white;
    margin:10px auto;
    padding:15px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    max-width:700px;
}

/* IMAGE */
.item img{
    width:70px;
    border-radius:10px;
}

/* TEXT */
.item span{
    flex:1;
    margin-left:10px;
    font-size:16px;
}

/* REMOVE BUTTON */
.item button{
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
}

/* TOTAL BOX */
#total{
    text-align:center;
    font-size:22px;
    margin-top:20px;
    color:green;
    font-weight:bold;
}

/* CHECKOUT BUTTON */
.checkout-btn{
    display:block;
    margin:20px auto;
    padding:12px 20px;
    background:gold;
    border:none;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

.checkout-btn:hover{
    background:orange;
}
</style>
</head>

<body>

<h2>🛒 My Cart</h2>

<ul id="cart-items"></ul>

<h3 id="total">Total: ₹0</h3>

<button class="checkout-btn" onclick="goToCheckout()">
    Proceed to Checkout
</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");
let total = 0;

cart.forEach((item, index) => {

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
        <img src="${item.image}" width="80">
        <span>${item.name} - ₹${item.price}</span>
        <button onclick="removeItem(${index})">Remove</button>
    `;

    container.appendChild(div);

    total += item.price;
});

document.getElementById("total").innerText = "Total: ₹" + total;

function removeItem(index){
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    location.reload();
}

function goToCheckout(){
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }
    window.location.href = "checkout.html";
}
</script>

</body>
</html>
